<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Alfred Voice Chat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a1a;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .container {
    width: 100%;
    max-width: 420px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 40px 20px;
    position: relative;
  }

  .header {
    text-align: center;
    margin-top: 20px;
  }

  .header h1 {
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    letter-spacing: 1px;
  }

  .header .subtitle {
    font-size: 12px;
    color: #666;
    margin-top: 4px;
  }

  /* Visualizer */
  .visualizer-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
  }

  .orb-container {
    position: relative;
    width: 200px;
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .orb {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #4a9eff, #1a5aff, #0a2a8a);
    box-shadow: 0 0 60px rgba(74, 158, 255, 0.3), 0 0 120px rgba(26, 90, 255, 0.15);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    position: relative;
  }

  .orb.listening {
    animation: pulse-listen 1.5s ease-in-out infinite;
    background: radial-gradient(circle at 35% 35%, #ff6b4a, #ff3a1a, #8a1a0a);
    box-shadow: 0 0 60px rgba(255, 107, 74, 0.4), 0 0 120px rgba(255, 58, 26, 0.2);
  }

  .orb.speaking {
    animation: pulse-speak 0.6s ease-in-out infinite;
    background: radial-gradient(circle at 35% 35%, #4affa5, #1aff6a, #0a8a3a);
    box-shadow: 0 0 60px rgba(74, 255, 165, 0.4), 0 0 120px rgba(26, 255, 106, 0.2);
  }

  .orb.processing {
    animation: spin-process 2s linear infinite;
    background: radial-gradient(circle at 35% 35%, #ffa54a, #ff8a1a, #8a4a0a);
    box-shadow: 0 0 60px rgba(255, 165, 74, 0.4), 0 0 120px rgba(255, 138, 26, 0.2);
  }

  @keyframes pulse-listen {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  @keyframes pulse-speak {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.12); }
  }

  @keyframes spin-process {
    0% { transform: rotate(0deg) scale(1); }
    25% { transform: rotate(90deg) scale(1.05); }
    50% { transform: rotate(180deg) scale(1); }
    75% { transform: rotate(270deg) scale(1.05); }
    100% { transform: rotate(360deg) scale(1); }
  }

  /* Sound wave rings around orb */
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(74, 158, 255, 0.2);
    animation: ring-expand 2s ease-out infinite;
    pointer-events: none;
  }

  .ring:nth-child(2) { animation-delay: 0.5s; }
  .ring:nth-child(3) { animation-delay: 1s; }

  @keyframes ring-expand {
    0% { width: 120px; height: 120px; opacity: 0.5; }
    100% { width: 250px; height: 250px; opacity: 0; }
  }

  .ring.hidden { display: none; }

  /* Status text */
  .status {
    text-align: center;
    margin-bottom: 10px;
  }

  .status-text {
    font-size: 14px;
    color: #888;
    min-height: 20px;
  }

  .status-text.active {
    color: #4a9eff;
  }

  /* Transcript area */
  .transcript {
    width: 100%;
    max-height: 120px;
    overflow-y: auto;
    padding: 12px 16px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 12px;
    margin-bottom: 20px;
    scrollbar-width: thin;
    scrollbar-color: #333 transparent;
  }

  .transcript:empty {
    display: none;
  }

  .transcript .user-msg {
    font-size: 13px;
    color: #aaa;
    margin-bottom: 6px;
    padding-left: 8px;
    border-left: 2px solid #ff6b4a;
  }

  .transcript .ai-msg {
    font-size: 13px;
    color: #ccc;
    margin-bottom: 6px;
    padding-left: 8px;
    border-left: 2px solid #4affa5;
  }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 40px;
  }

  .btn-mic {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #4a9eff, #1a5aff);
    color: white;
    font-size: 28px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(74, 158, 255, 0.4);
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-mic:active {
    transform: scale(0.95);
  }

  .btn-mic.recording {
    background: linear-gradient(135deg, #ff6b4a, #ff3a1a);
    box-shadow: 0 4px 20px rgba(255, 107, 74, 0.5);
    animation: pulse-btn 1s ease-in-out infinite;
  }

  @keyframes pulse-btn {
    0%, 100% { box-shadow: 0 4px 20px rgba(255, 107, 74, 0.5); }
    50% { box-shadow: 0 4px 40px rgba(255, 107, 74, 0.8); }
  }

  .btn-secondary {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 1px solid #333;
    background: rgba(255, 255, 255, 0.05);
    color: #888;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-secondary:active {
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
  }

  /* Audio bars visualization */
  .audio-bars {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
    height: 40px;
    margin-bottom: 10px;
  }

  .audio-bars.hidden { display: none; }

  .bar {
    width: 3px;
    background: #4a9eff;
    border-radius: 2px;
    transition: height 0.1s ease;
    min-height: 4px;
  }

  .bar.listening-bar { background: #ff6b4a; }
  .bar.speaking-bar { background: #4affa5; }

  /* Settings panel */
  .settings-panel {
    position: fixed;
    top: 0;
    right: -320px;
    width: 300px;
    height: 100vh;
    background: #12122a;
    border-left: 1px solid #222;
    padding: 20px;
    transition: right 0.3s ease;
    z-index: 100;
    overflow-y: auto;
  }

  .settings-panel.open {
    right: 0;
  }

  .settings-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 99;
    display: none;
  }

  .settings-overlay.show { display: block; }

  .settings-panel h3 {
    font-size: 16px;
    margin-bottom: 20px;
    color: #fff;
  }

  .setting-item {
    margin-bottom: 16px;
  }

  .setting-item label {
    font-size: 12px;
    color: #888;
    display: block;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .setting-item select,
  .setting-item input {
    width: 100%;
    padding: 8px 12px;
    background: rgba(255,255,255,0.08);
    border: 1px solid #333;
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
    outline: none;
  }

  .setting-item select:focus,
  .setting-item input:focus {
    border-color: #4a9eff;
  }

  .connection-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #666;
    margin-top: 8px;
  }

  .connection-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #666;
  }

  .connection-dot.connected { background: #4affa5; }
  .connection-dot.error { background: #ff4a4a; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🎙️ ALFRED</h1>
    <div class="subtitle">Voice Chat</div>
    <div class="connection-status">
      <div class="connection-dot" id="connDot"></div>
      <span id="connText">Conectare...</span>
    </div>
  </div>

  <div class="visualizer-container">
    <div class="orb-container">
      <div class="ring hidden" id="ring1"></div>
      <div class="ring hidden" id="ring2"></div>
      <div class="ring hidden" id="ring3"></div>
      <div class="orb" id="orb"></div>
    </div>
  </div>

  <div class="audio-bars hidden" id="audioBars"></div>

  <div class="status">
    <div class="status-text" id="statusText">Apasă microfonul pentru a vorbi</div>
  </div>

  <div class="transcript" id="transcript"></div>

  <div class="controls">
    <button class="btn-secondary" id="btnSettings" onclick="toggleSettings()">⚙️</button>
    <button class="btn-mic" id="btnMic" onclick="toggleRecording()">🎤</button>
    <button class="btn-secondary" id="btnClear" onclick="clearTranscript()">🗑️</button>
  </div>
</div>

<!-- Settings Panel -->
<div class="settings-overlay" id="settingsOverlay" onclick="toggleSettings()"></div>
<div class="settings-panel" id="settingsPanel">
  <h3>⚙️ Setări</h3>

  <div class="setting-item">
    <label>Limbă</label>
    <select id="settingLang">
      <option value="ro" selected>Română</option>
      <option value="en">English</option>
    </select>
  </div>

  <div class="setting-item">
    <label>Voce TTS</label>
    <select id="settingVoice">
      <option value="male" selected>Emil (Masculin)</option>
      <option value="female">Alina (Feminin)</option>
    </select>
  </div>

  <div class="setting-item">
    <label>Viteză vorbire</label>
    <select id="settingRate">
      <option value="0%">Normal</option>
      <option value="-10%" selected>Puțin mai lent</option>
      <option value="-20%">Lent</option>
      <option value="+10%">Rapid</option>
    </select>
  </div>

  <div class="setting-item">
    <label>Backend API URL</label>
    <input type="text" id="settingApi" placeholder="http://localhost:3000" value="">
  </div>

  <div class="setting-item">
    <label>Groq API Key (STT)</label>
    <input type="password" id="settingGroqKey" placeholder="gsk_...">
  </div>
</div>

<script>
// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let isRecording = false;
let mediaRecorder = null;
let audioChunks = [];
let audioContext = null;
let analyser = null;
let animFrame = null;

const orb = document.getElementById('orb');
const rings = [document.getElementById('ring1'), document.getElementById('ring2'), document.getElementById('ring3')];
const statusText = document.getElementById('statusText');
const btnMic = document.getElementById('btnMic');
const transcript = document.getElementById('transcript');
const audioBars = document.getElementById('audioBars');
const connDot = document.getElementById('connDot');
const connText = document.getElementById('connText');

// Create audio bars
for (let i = 0; i < 20; i++) {
  const bar = document.createElement('div');
  bar.className = 'bar';
  bar.style.height = '4px';
  audioBars.appendChild(bar);
}

// ═══════════════════════════════════════
// RECORDING
// ═══════════════════════════════════════
async function toggleRecording() {
  if (isRecording) {
    stopRecording();
  } else {
    startRecording();
  }
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    audioContext = new AudioContext();
    const source = audioContext.createMediaStreamSource(stream);
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 64;
    source.connect(analyser);

    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
    audioChunks = [];

    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) audioChunks.push(e.data);
    };

    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      await processAudio(blob);
    };

    mediaRecorder.start(100);
    isRecording = true;

    orb.className = 'orb listening';
    btnMic.className = 'btn-mic recording';
    btnMic.textContent = '⏹️';
    statusText.textContent = 'Ascult...';
    statusText.className = 'status-text active';
    showRings(true);
    audioBars.classList.remove('hidden');

    visualize();
  } catch (err) {
    statusText.textContent = '❌ Nu am acces la microfon';
    console.error(err);
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  isRecording = false;

  btnMic.className = 'btn-mic';
  btnMic.textContent = '🎤';
  showRings(false);

  if (animFrame) cancelAnimationFrame(animFrame);
  if (audioContext) audioContext.close();
}

// ═══════════════════════════════════════
// AUDIO VISUALIZATION
// ═══════════════════════════════════════
function visualize() {
  if (!analyser || !isRecording) return;

  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);

  const bars = audioBars.querySelectorAll('.bar');
  for (let i = 0; i < bars.length; i++) {
    const idx = Math.floor(i * data.length / bars.length);
    const val = data[idx] || 0;
    const height = Math.max(4, (val / 255) * 40);
    bars[i].style.height = height + 'px';
    bars[i].className = 'bar listening-bar';
  }

  // Scale orb based on volume
  const avg = data.reduce((a, b) => a + b, 0) / data.length;
  const scale = 1 + (avg / 255) * 0.15;
  orb.style.transform = `scale(${scale})`;

  animFrame = requestAnimationFrame(visualize);
}

function showRings(show) {
  rings.forEach(r => {
    r.classList.toggle('hidden', !show);
  });
}

// ═══════════════════════════════════════
// PROCESS AUDIO (STT → LLM → TTS)
// ═══════════════════════════════════════
async function processAudio(audioBlob) {
  orb.className = 'orb processing';
  statusText.textContent = 'Procesez...';
  audioBars.classList.add('hidden');

  try {
    // Step 1: STT with Groq Whisper
    const groqKey = document.getElementById('settingGroqKey').value;
    if (!groqKey) {
      statusText.textContent = '⚠️ Setează Groq API Key în setări';
      orb.className = 'orb';
      return;
    }

    statusText.textContent = 'Transcriu vocea...';
    const transcription = await transcribeAudio(audioBlob, groqKey);

    if (!transcription || transcription.trim() === '') {
      statusText.textContent = 'Nu am detectat vorbire';
      orb.className = 'orb';
      return;
    }

    addMessage('user', transcription);

    // Step 2: Send to backend (Alfred)
    statusText.textContent = 'Alfred gândește...';
    const apiUrl = document.getElementById('settingApi').value;

    let response;
    if (apiUrl) {
      response = await sendToBackend(apiUrl, transcription);
    } else {
      // Demo mode - echo back
      response = `Am primit mesajul tău: "${transcription}". Configurează Backend API URL în setări pentru răspunsuri reale.`;
    }

    addMessage('ai', response);

    // Step 3: TTS - generate audio response
    statusText.textContent = 'Generez răspuns vocal...';
    orb.className = 'orb speaking';
    showRings(true);

    if (apiUrl) {
      await playTTSFromBackend(apiUrl, response);
    } else {
      // Use browser speech synthesis as fallback
      await speakBrowser(response);
    }

  } catch (err) {
    statusText.textContent = '❌ Eroare: ' + err.message;
    console.error(err);
  } finally {
    orb.className = 'orb';
    showRings(false);
    statusText.textContent = 'Apasă microfonul pentru a vorbi';
  }
}

// ═══════════════════════════════════════
// GROQ WHISPER STT
// ═══════════════════════════════════════
async function transcribeAudio(blob, apiKey) {
  const formData = new FormData();
  formData.append('file', blob, 'audio.webm');
  formData.append('model', 'whisper-large-v3');
  formData.append('language', document.getElementById('settingLang').value);
  formData.append('response_format', 'text');

  const res = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${apiKey}` },
    body: formData
  });

  if (!res.ok) throw new Error('Groq STT failed: ' + res.status);
  return await res.text();
}

// ═══════════════════════════════════════
// BACKEND API
// ═══════════════════════════════════════
async function sendToBackend(apiUrl, text) {
  const res = await fetch(apiUrl + '/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: text, lang: document.getElementById('settingLang').value })
  });
  if (!res.ok) throw new Error('Backend error: ' + res.status);
  const data = await res.json();
  return data.response || data.text || 'No response';
}

async function playTTSFromBackend(apiUrl, text) {
  const lang = document.getElementById('settingLang').value;
  const voice = document.getElementById('settingVoice').value;
  const rate = document.getElementById('settingRate').value;

  const res = await fetch(apiUrl + '/tts', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text, lang, voice, rate })
  });

  if (!res.ok) throw new Error('TTS error: ' + res.status);

  const audioBlob = await res.blob();
  await playAudioBlob(audioBlob);
}

// ═══════════════════════════════════════
// AUDIO PLAYBACK
// ═══════════════════════════════════════
function playAudioBlob(blob) {
  return new Promise((resolve) => {
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);

    audio.onended = () => {
      URL.revokeObjectURL(url);
      resolve();
    };
    audio.onerror = () => {
      URL.revokeObjectURL(url);
      resolve();
    };

    audio.play();
    visualizeSpeaking(audio);
  });
}

function speakBrowser(text) {
  return new Promise((resolve) => {
    const lang = document.getElementById('settingLang').value;
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = lang === 'ro' ? 'ro-RO' : 'en-US';
    utterance.rate = 0.9;
    utterance.onend = resolve;
    utterance.onerror = resolve;
    speechSynthesis.speak(utterance);

    // Animate bars while speaking
    const interval = setInterval(() => {
      if (!speechSynthesis.speaking) {
        clearInterval(interval);
        return;
      }
      const bars = audioBars.querySelectorAll('.bar');
      bars.forEach(bar => {
        bar.className = 'bar speaking-bar';
        bar.style.height = (4 + Math.random() * 30) + 'px';
      });
    }, 100);

    audioBars.classList.remove('hidden');
  });
}

function visualizeSpeaking(audio) {
  const ctx = new AudioContext();
  const source = ctx.createMediaElementSource(audio);
  const analyserNode = ctx.createAnalyser();
  analyserNode.fftSize = 64;
  source.connect(analyserNode);
  analyserNode.connect(ctx.destination);

  const bars = audioBars.querySelectorAll('.bar');
  audioBars.classList.remove('hidden');

  function draw() {
    if (audio.ended || audio.paused) {
      audioBars.classList.add('hidden');
      ctx.close();
      return;
    }
    const data = new Uint8Array(analyserNode.frequencyBinCount);
    analyserNode.getByteFrequencyData(data);

    for (let i = 0; i < bars.length; i++) {
      const idx = Math.floor(i * data.length / bars.length);
      const height = Math.max(4, (data[idx] / 255) * 40);
      bars[i].style.height = height + 'px';
      bars[i].className = 'bar speaking-bar';
    }

    requestAnimationFrame(draw);
  }
  draw();
}

// ═══════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════
function addMessage(type, text) {
  const div = document.createElement('div');
  div.className = type === 'user' ? 'user-msg' : 'ai-msg';
  div.textContent = text;
  transcript.appendChild(div);
  transcript.scrollTop = transcript.scrollHeight;
}

function clearTranscript() {
  transcript.innerHTML = '';
}

function toggleSettings() {
  const panel = document.getElementById('settingsPanel');
  const overlay = document.getElementById('settingsOverlay');
  panel.classList.toggle('open');
  overlay.classList.toggle('show');
  saveSettings();
}

// Persist settings
function saveSettings() {
  const settings = {
    lang: document.getElementById('settingLang').value,
    voice: document.getElementById('settingVoice').value,
    rate: document.getElementById('settingRate').value,
    api: document.getElementById('settingApi').value,
    groqKey: document.getElementById('settingGroqKey').value,
  };
  localStorage.setItem('alfred_voice_settings', JSON.stringify(settings));
}

function loadSettings() {
  try {
    const saved = JSON.parse(localStorage.getItem('alfred_voice_settings'));
    if (saved) {
      if (saved.lang) document.getElementById('settingLang').value = saved.lang;
      if (saved.voice) document.getElementById('settingVoice').value = saved.voice;
      if (saved.rate) document.getElementById('settingRate').value = saved.rate;
      if (saved.api) document.getElementById('settingApi').value = saved.api;
      if (saved.groqKey) document.getElementById('settingGroqKey').value = saved.groqKey;
    }
  } catch(e) {}
}

// Init
loadSettings();

// Check connection
function checkConnection() {
  const api = document.getElementById('settingApi').value;
  if (!api) {
    connDot.className = 'connection-dot';
    connText.textContent = 'Demo mode (setează API URL)';
    return;
  }

  fetch(api + '/health')
    .then(r => {
      if (r.ok) {
        connDot.className = 'connection-dot connected';
        connText.textContent = 'Conectat la Alfred';
      } else {
        throw new Error();
      }
    })
    .catch(() => {
      connDot.className = 'connection-dot error';
      connText.textContent = 'Nu pot conecta la backend';
    });
}

checkConnection();
setInterval(checkConnection, 30000);

// Save settings on change
document.querySelectorAll('#settingsPanel select, #settingsPanel input').forEach(el => {
  el.addEventListener('change', () => {
    saveSettings();
    checkConnection();
  });
});
</script>

</body>
</html>
