<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Alfred Voice</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    width: 100%;
    max-width: 420px;
    padding: 20px;
    height: 100%;
    justify-content: center;
  }

  /* Orb */
  .orb-wrap {
    position: relative;
    width: 180px;
    height: 180px;
    flex-shrink: 0;
  }

  .orb {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #222, #0a0a0a);
    box-shadow: 0 0 30px rgba(100, 100, 255, 0.08);
    transition: all 0.4s ease;
  }

  .orb.listening {
    background: radial-gradient(circle at 35% 35%, #1a3a5c, #0a1a2e);
    box-shadow: 0 0 50px rgba(50, 120, 255, 0.35), 0 0 100px rgba(50, 120, 255, 0.12);
    animation: pulse 1.5s ease-in-out infinite;
  }

  .orb.thinking {
    background: radial-gradient(circle at 35% 35%, #3a2a1a, #1e150a);
    box-shadow: 0 0 50px rgba(255, 160, 50, 0.35), 0 0 100px rgba(255, 160, 50, 0.12);
    animation: pulse 0.8s ease-in-out infinite;
  }

  .orb.speaking {
    background: radial-gradient(circle at 35% 35%, #1a3a1a, #0a1e0a);
    box-shadow: 0 0 50px rgba(50, 255, 100, 0.35), 0 0 100px rgba(50, 255, 100, 0.12);
    animation: pulse 0.5s ease-in-out infinite;
  }

  .orb.error {
    background: radial-gradient(circle at 35% 35%, #3a1a1a, #1e0a0a);
    box-shadow: 0 0 50px rgba(255, 50, 50, 0.35);
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }

  /* Rings */
  .ring {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border: 1px solid rgba(100, 150, 255, 0.15);
    pointer-events: none;
    opacity: 0;
  }
  .listening .ring { animation: ring-out 2s ease-out infinite; }
  .ring:nth-child(2) { animation-delay: 0.6s; }
  .ring:nth-child(3) { animation-delay: 1.2s; }
  @keyframes ring-out {
    0% { width: 180px; height: 180px; opacity: 0.4; }
    100% { width: 320px; height: 320px; opacity: 0; }
  }

  /* Status */
  .status {
    font-size: 15px;
    color: #666;
    text-align: center;
    min-height: 22px;
    transition: color 0.3s;
  }
  .status.active { color: #999; }

  /* Transcript */
  .transcript {
    width: 100%;
    flex: 1;
    max-height: 220px;
    overflow-y: auto;
    padding: 12px 14px;
    background: rgba(255,255,255,0.025);
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.5;
  }
  .transcript:empty { display: none; }
  .transcript .msg { margin-bottom: 10px; }
  .transcript .msg:last-child { margin-bottom: 0; }
  .transcript .lbl {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.4;
    display: block;
    margin-bottom: 2px;
  }
  .transcript .u { color: #7aa2f7; }
  .transcript .a { color: #9ece6a; }
  .transcript::-webkit-scrollbar { width: 3px; }
  .transcript::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  /* Button */
  .ptt {
    width: 72px; height: 72px;
    border-radius: 50%;
    border: 2px solid #2a2a2a;
    background: #141414;
    color: #666;
    font-size: 26px;
    cursor: pointer;
    transition: all 0.15s ease;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ptt:hover { border-color: #444; }
  .ptt.active {
    background: #1a2a4a;
    border-color: #3278ff;
    color: #3278ff;
    transform: scale(1.12);
    box-shadow: 0 0 25px rgba(50,120,255,0.3);
  }
  .ptt.disabled {
    opacity: 0.3;
    pointer-events: none;
  }

  .hint {
    font-size: 11px;
    color: #444;
    text-align: center;
  }
</style>
</head>
<body>

<div class="container">
  <div class="orb-wrap">
    <div class="orb" id="orb">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
    </div>
  </div>
  <div class="status" id="status">Apasă și vorbește</div>
  <div class="transcript" id="transcript"></div>
  <button class="ptt" id="ptt">🎙️</button>
  <div class="hint">Ține apăsat · Dă drumul să trimiți</div>
</div>

<script>
// ═══════════════════════════════════
// CONFIG
// ═══════════════════════════════════
let GROQ_KEY = localStorage.getItem('groq_key') || '';

// First run: ask for key
if (!GROQ_KEY) {
  GROQ_KEY = prompt('Groq API Key (gsk_...):') || '';
  if (GROQ_KEY) localStorage.setItem('groq_key', GROQ_KEY);
}

const SYSTEM = `You are Alfred, a personal assistant for Andrei Antonescu (Anton).
You respond in Romanian by default unless the user speaks in another language.
Keep responses concise and conversational — this is a voice chat, not text.
Max 2-3 sentences per response. Be natural, warm, slightly witty.`;

// ═══════════════════════════════════
// STATE
// ═══════════════════════════════════
const orb = document.getElementById('orb');
const statusEl = document.getElementById('status');
const transcriptEl = document.getElementById('transcript');
const pttBtn = document.getElementById('ptt');

let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let isBusy = false;
let messages = [];
let synth = window.speechSynthesis;
let roVoice = null;

// ═══════════════════════════════════
// TTS — Web Speech API
// ═══════════════════════════════════
function loadVoices() {
  const voices = synth.getVoices();
  // Try to find a Romanian voice
  roVoice = voices.find(v => v.lang.startsWith('ro')) ||
            voices.find(v => v.name.toLowerCase().includes('roman')) ||
            null;
  console.log('Romanian voice:', roVoice?.name || 'none (using default)');
}

synth.onvoiceschanged = loadVoices;
loadVoices();

function speak(text) {
  return new Promise((resolve) => {
    // Cancel any ongoing speech
    synth.cancel();

    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'ro-RO';
    if (roVoice) utt.voice = roVoice;
    utt.rate = 1.0;
    utt.pitch = 1.0;

    utt.onend = resolve;
    utt.onerror = resolve;

    setOrb('speaking');
    synth.speak(utt);

    // Workaround: Chrome pauses long utterances
    const resumeInterval = setInterval(() => {
      if (!synth.speaking) { clearInterval(resumeInterval); return; }
      synth.pause();
      synth.resume();
    }, 10000);

    utt.onend = () => { clearInterval(resumeInterval); resolve(); };
    utt.onerror = () => { clearInterval(resumeInterval); resolve(); };
  });
}

// ═══════════════════════════════════
// STT — Groq Whisper
// ═══════════════════════════════════
async function transcribe(audioBlob) {
  const form = new FormData();
  form.append('file', audioBlob, 'audio.webm');
  form.append('model', 'whisper-large-v3');
  form.append('language', 'ro');

  const resp = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${GROQ_KEY}` },
    body: form,
  });

  if (!resp.ok) throw new Error(`STT error: ${resp.status}`);
  const data = await resp.json();
  return data.text;
}

// ═══════════════════════════════════
// LLM — Groq (llama-3.3-70b)
// ═══════════════════════════════════
async function chat(userText) {
  messages.push({ role: 'user', content: userText });

  // Keep last 20 messages
  const ctx = messages.slice(-20);

  const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${GROQ_KEY}`,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({
      model: 'llama-3.3-70b-versatile',
      messages: [{ role: 'system', content: SYSTEM }, ...ctx],
      max_tokens: 300,
      temperature: 0.7,
    }),
  });

  if (!resp.ok) throw new Error(`LLM error: ${resp.status}`);
  const data = await resp.json();
  const reply = data.choices[0].message.content;

  messages.push({ role: 'assistant', content: reply });
  return reply;
}

// ═══════════════════════════════════
// RECORDING
// ═══════════════════════════════════
async function startRecording() {
  if (isRecording || isBusy) return;

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true }
    });

    audioChunks = [];
    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus' : 'audio/webm';

    mediaRecorder = new MediaRecorder(stream, { mimeType });

    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) audioChunks.push(e.data);
    };

    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(audioChunks, { type: mimeType });

      if (blob.size < 1000) {
        setStatus('Prea scurt — încearcă din nou');
        setOrb('idle');
        return;
      }

      await processAudio(blob);
    };

    mediaRecorder.start(100);
    isRecording = true;
    setOrb('listening');
    setStatus('Ascult...');
    pttBtn.classList.add('active');
  } catch (err) {
    setStatus('❌ Nu am acces la microfon');
    setOrb('error');
    console.error(err);
  }
}

function stopRecording() {
  if (!isRecording) return;
  isRecording = false;
  mediaRecorder?.stop();
  pttBtn.classList.remove('active');
}

// ═══════════════════════════════════
// PIPELINE: STT → LLM → TTS
// ═══════════════════════════════════
async function processAudio(blob) {
  isBusy = true;
  pttBtn.classList.add('disabled');

  try {
    // 1. Transcribe
    setOrb('thinking');
    setStatus('Transcriu...');
    const text = await transcribe(blob);
    addMsg('u', text);

    // 2. Chat
    setStatus('Gândesc...');
    const reply = await chat(text);
    addMsg('a', reply);

    // 3. Speak
    setStatus('Vorbesc...');
    await speak(reply);

  } catch (err) {
    console.error(err);
    setStatus(`❌ ${err.message}`);
    setOrb('error');
    await new Promise(r => setTimeout(r, 2000));
  }

  isBusy = false;
  pttBtn.classList.remove('disabled');
  setOrb('idle');
  setStatus('Apasă și vorbește');
}

// ═══════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════
function setOrb(s) {
  orb.className = 'orb' + (s !== 'idle' ? ` ${s}` : '');
}

function setStatus(t) {
  statusEl.textContent = t;
  statusEl.className = 'status' + (t !== 'Apasă și vorbește' ? ' active' : '');
}

function addMsg(role, text) {
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.innerHTML = `<span class="lbl">${role === 'u' ? 'Tu' : 'Alfred'}</span>${text}`;
  transcriptEl.appendChild(d);
  transcriptEl.scrollTop = transcriptEl.scrollHeight;
}

// ═══════════════════════════════════
// EVENTS
// ═══════════════════════════════════
pttBtn.addEventListener('mousedown', e => { e.preventDefault(); startRecording(); });
pttBtn.addEventListener('mouseup', stopRecording);
pttBtn.addEventListener('mouseleave', stopRecording);

pttBtn.addEventListener('touchstart', e => { e.preventDefault(); startRecording(); });
pttBtn.addEventListener('touchend', e => { e.preventDefault(); stopRecording(); });
pttBtn.addEventListener('touchcancel', stopRecording);

document.addEventListener('keydown', e => {
  if (e.code === 'Space' && !e.repeat) { e.preventDefault(); startRecording(); }
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space') { e.preventDefault(); stopRecording(); }
});
</script>
</body>
</html>
